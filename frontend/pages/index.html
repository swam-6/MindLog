<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MindLog — Mental Health Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #7a9e87;
    --sage-light: #d4e6db;
    --sage-pale: #f0f7f2;
    --amber: #d4845a;
    --text: #1a2e22;
    --text-muted: #6b8074;
    --card-bg: #ffffff;
    --border: #d8e8de;
    --red: #c0392b;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sage-pale);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image: radial-gradient(circle at 20% 20%, #d4e6db88 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, #e8f3ec88 0%, transparent 50%);
  }

  .container {
    width: 100%;
    max-width: 460px;
  }

  .brand {
    text-align: center;
    margin-bottom: 2rem;
  }

  .brand-icon {
    width: 56px;
    height: 56px;
    background: var(--sage);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    font-size: 26px;
  }

  .brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .brand p {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  .card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 2.5rem;
    border: 1px solid var(--border);
    box-shadow: 0 4px 40px rgba(122,158,135,0.12);
  }

  .tabs {
    display: flex;
    background: var(--sage-pale);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 2rem;
  }

  .tab {
    flex: 1;
    padding: 0.6rem;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: white;
    color: var(--text);
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: white;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--sage);
  }

  .btn {
    width: 100%;
    padding: 0.85rem;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn:hover { background: #6a8e77; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-msg {
    background: #fdecea;
    color: var(--red);
    padding: 0.7rem 1rem;
    border-radius: 8px;
    font-size: 0.88rem;
    margin-bottom: 1rem;
    display: none;
    border-left: 3px solid var(--red);
  }

  .sdg-badge {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .sdg-badge span {
    background: var(--sage-light);
    color: var(--sage);
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
  }

  .form-panel { display: none; }
  .form-panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .form-panel.active { animation: fadeIn 0.25s ease; }
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-icon">🌿</div>
    <h1>MindLog</h1>
    <p>Your private mental wellness journal</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Create Account</button>
    </div>

    <div id="error-box" class="error-msg"></div>

    <!-- LOGIN -->
    <div id="login-panel" class="form-panel active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button class="btn" id="login-btn" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div id="register-panel" class="form-panel">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters"/>
      </div>
      <button class="btn" id="register-btn" onclick="handleRegister()">Create Account</button>
    </div>
  </div>

  <div class="sdg-badge">
    Aligned with <span>UN SDG 3.4 — Mental Health</span>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
  document.getElementById('login-panel').classList.toggle('active', tab==='login');
  document.getElementById('register-panel').classList.toggle('active', tab==='register');
  hideError();
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
}

function hideError() {
  document.getElementById('error-box').style.display = 'none';
}

async function handleLogin() {
  hideError();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showError('Please fill in all fields.');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/dashboard';
  } catch(e) {
    showError(e.message || 'Login failed.');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function handleRegister() {
  hideError();
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showError('Please fill in all fields.');
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/dashboard';
  } catch(e) {
    showError(e.message || 'Registration failed.');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

// Redirect if already logged in
if (localStorage.getItem('token')) window.location.href = '/dashboard';

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-panel').classList.contains('active')) handleLogin();
    else handleRegister();
  }
});
</script>
</body>
</html>
